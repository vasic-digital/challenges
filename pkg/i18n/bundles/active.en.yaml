# CONST-046 active bundle — English source-of-truth message
# strings for challenges/pkg/userflow/evaluators.go.
#
# Each entry's "other" value is the EXACT original English literal
# that previously lived as a hardcoded format string inside an
# evaluator return path. Consumers of the challenges submodule
# load this bundle (or a locale-specific override) into their
# Translator implementation; the package-level translator (set
# via i18n.SetPkgTranslator) then renders these IDs at runtime
# with the templateData supplied by the call site.
#
# Format-string convention: arguments are referenced by name via
# {{.fieldname}} (Go text/template syntax). Order of the original
# %d/%T/%s is preserved as documentation in the bundle key name.
#
# Round 100 — first 10 entries (evaluators.go, 27 hits total).
# Remaining 17 hits planned for round 101+ migration.

